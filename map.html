<!DOCTYPE html>
<html>
<head>
  <title>IG District Impact: Student Teacher Placements</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: white;
      z-index: 1000;
      text-align: center;
      line-height: 50px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
    }

    #map {
      position: absolute;
      top: 50px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .legend {
      background: white;
      padding: 10px;
      line-height: 1.5em;
      font-size: 14px;
      border: 1px solid #999;
      border-radius: 4px;
    }

.higher-ed-icon {
  width: 12px;
  height: 12px;
  background: #6a3d9a;
  border: 1px solid #333;
  transform: rotate(45deg);
}

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
      border: 1px solid #555;
    }

/* Base alignment for all legend symbols */
.legend span {
  display: inline-block;
  vertical-align: middle;
  margin-right: 6px;
}

/* Circle markers */
.legend-dot {
  background: #2171b5;
  border-radius: 50%;
}

.legend-dot.small {
  width: 8px;
  height: 8px;
}

.legend-dot.medium {
  width: 12px;
  height: 12px;
}

/* Triangle marker */
.legend-triangle {
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 10px solid #ef8a62;
}

/* District color boxes */
.legend-box {
  width: 12px;
  height: 12px;
  border: 1px solid #555;
}

.legend-box.light {
  background: #d9f0d3;
}

.legend-box.medium {
  background: #78c679;
}

.legend-box.dark {
  background: #238443;
}

    .leaflet-bottom.leaflet-right {
      bottom: 15px;
    }
  </style>
</head>

<body>
<div id="header">IG District Impact: Student Teacher Placements</div>
<div id="map"></div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSEcKRL5Me5ZvzyP03_qwSSC0Iod8frvj9eazXZ98oysG3IcIcX2j4hNSAY5iOXSHWIBE06WtJYCZjP/pub?gid=0&single=true&output=csv";
const higherEdCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQRHV8jK3877Wd5756VJkb-5q9twMtoex58MRcTdi4lkkV1_RNnxzBD7XewDOSATy1mXYjsmYmlY_1/pub?gid=0&single=true&output=csv";
const geojsonUrl = "ohio_districts.geojson";

const map = L.map("map").setView([40.3, -82.8], 8);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  subdomains: "abcd",
  maxZoom: 20
}).addTo(map);

let dataMap = {};
let csvRowsById = {};
let districtLayer;
let pointsLayer = L.layerGroup();
let higherEdLayer = L.layerGroup();

function getColor(value) {
  if (value === 3) return "#238443";
  if (value === 2) return "#78c679";
  if (value === 1) return "#d9f0d3";
  return "#ffffff";
}

function getPointRadius(value) {
  if (value === 3) return 20;
  if (value === 2) return 12;
  if (value === 1) return 4;
  return 0;
}

function getPlacementLabel(value) {
  if (value === 3) return "Large";
  if (value === 2) return "Medium";
  if (value === 1) return "Small";
  return "None";
}

function districtStyle(feature) {
  const id = String(feature.properties.GEOID).trim();
  const val = dataMap[id];

  return {
    fillColor: getColor(val),
    weight: 0.6,
    color: "#555",
    fillOpacity: val && val > 0 ? 0.75 : 0
  };
}

function makeTriangle(lat, lon) {
  return L.polygon([
    [lat + 0.035, lon],
    [lat - 0.025, lon - 0.025],
    [lat - 0.025, lon + 0.025]
  ], {
    color: "#b2182b",
    fillColor: "#ef8a62",
    fillOpacity: 0.8,
    weight: 1
  });
}

Papa.parse(csvUrl, {
  download: true,
  header: true,
  skipEmptyLines: true,

  complete: function(results) {
    console.log("CSV loaded:", results.data);

    results.data.forEach(row => {
      const agencyText = String(row.AgencyID ?? "").trim();
      const isPrivate = agencyText === "";
      const id = agencyText.padStart(6, "0");

      const combined = parseInt(row.Combined);
      const lat = parseFloat(row.Latitude);
      const lon = parseFloat(row.Longitude);

      if (!isPrivate && id) {
        dataMap[id] = combined;
        csvRowsById[id] = row;
      }

      if (!isNaN(lat) && !isNaN(lon)) {
        let marker = null;

        if (isPrivate) {
          marker = makeTriangle(lat, lon);
        } else {
          const radius = getPointRadius(combined);

          if (radius > 0) {
            marker = L.circleMarker([lat, lon], {
              radius: radius,
              color: "#2171b5",
              fillColor: "#2171b5",
              fillOpacity: 0.7,
              weight: 1
            });
          }
        }

        if (marker) {
          const districtName = row.DistrictOriginal ?? "Unknown";
          const placementText = isPrivate ? "Small" : getPlacementLabel(combined);

          marker.bindPopup(`
            District: ${districtName}<br>
            Type: ${isPrivate ? "Private/Other" : "Public OH"}<br>
            Teaching Placements: ${placementText}
          `);

          marker.bindTooltip(`
            District: ${districtName}<br>
            Type: ${isPrivate ? "Private/Other" : "Public OH"}<br>
            Teaching Placements: ${placementText}
          `, { sticky: true });

          pointsLayer.addLayer(marker);
        }
      }
    });

    loadGeoJSON();
  },

  error: function(error) {
    console.error("CSV loading error:", error);
    alert("Could not load the Google Sheets CSV.");
  }
});


Papa.parse(higherEdCsvUrl, {
  download: true,
  header: true,
  skipEmptyLines: true,

  complete: function(results) {
    console.log("Higher ed CSV loaded:", results.data);

    results.data.forEach(row => {
      const lat = parseFloat(row.Latitude);
      const lon = parseFloat(row.Longitude);

      const name =
        row.University ||
        row.Name ||
        row.Institution ||
        row.School ||
        row.College ||
        "Higher Ed Institution";

      if (!isNaN(lat) && !isNaN(lon)) {
        const icon = L.divIcon({
          className: "",
          html: '<div class="higher-ed-icon"></div>',
          iconSize: [12, 12],
          iconAnchor: [6, 6]
        });

        const marker = L.marker([lat, lon], { icon: icon });

        marker.bindTooltip(name, { sticky: true });
        marker.bindPopup(name);

        higherEdLayer.addLayer(marker);
      }
    });
  },

  error: function(error) {
    console.error("Higher ed CSV loading error:", error);
    alert("Could not load the higher ed CSV.");
  }
});



function loadGeoJSON() {
  fetch(geojsonUrl)
    .then(response => {
      if (!response.ok) {
        throw new Error("Could not load GeoJSON file: " + response.status);
      }
      return response.json();
    })
    .then(data => {
      districtLayer = L.geoJSON(data, {
        style: districtStyle,

        onEachFeature: function(feature, layer) {
          const id = String(feature.properties.GEOID).trim();
          const val = dataMap[id];
          const districtName = csvRowsById[id]?.DistrictOriginal ?? "Unknown";

          const text = `
            District ID: ${id}<br>
            District: ${districtName}<br>
            Teaching Placements: ${getPlacementLabel(val)}
          `;

          layer.bindPopup(text);
          layer.bindTooltip(text, { sticky: true });
        }
      }).addTo(map);

      const overlayMaps = {
  "District Shading": districtLayer,
  "Schools / Placements": pointsLayer,
  "Institutes of Higher Education": higherEdLayer
};

      L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);
    })
    .catch(error => {
      console.error(error);
      alert(error.message);
    });
}

const legend = L.control({ position: "bottomright" });

legend.onAdd = function(map) {
  const div = L.DomUtil.create("div", "legend");

  div.innerHTML = `
  <strong>Teaching Placements</strong><br>

  <span class="legend-dot small"></span>
  1–20 teachers (Public OH)<br>

  <span class="legend-dot medium"></span>
  21–50 teachers (Public OH)<br>

  <span class="legend-triangle"></span>
  1–20 teachers (Private/Other)<br>

  <hr>

  <span class="legend-box light"></span> Small district impact<br>
  <span class="legend-box medium"></span> Medium district impact<br>
  <span class="legend-box dark"></span> Large district impact
`;

  return div;
};

legend.addTo(map);
</script>
</body>
</html>
